name: Generate Daily Fractal

on:
  schedule:
    # 毎日 UTC 20:00 に実行（JST 05:00）
    - cron: "0 20 * * *"
  workflow_dispatch:
    # 手動実行も可能
    inputs:
      date:
        description: "日付 (YYYYMMDD) - 空欄なら今日"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate fractal
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python generate.py "${{ github.event.inputs.date }}"
          else
            python generate.py
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/daily.png
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update daily fractal $(TZ=Asia/Tokyo date +%Y-%m-%d)"
          git push
